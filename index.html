<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Innovexa ERP</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --panel-3: #243041;
      --border: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #4f46e5;
      --accent-2: #4338ca;
      --green: #10b981;
      --red: #ef4444;
      --amber: #f59e0b;
      --cyan: #06b6d4;
      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }
    button, input, select, textarea { font: inherit; }
    .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .sidebar { background: linear-gradient(180deg, #0b1220 0%, #0f172a 100%); border-right: 1px solid var(--border); padding: 18px; }
    .brand { display: flex; align-items: center; gap: 12px; padding: 10px 8px 20px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
    .logo { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--cyan)); display: grid; place-items: center; font-weight: 800; font-size: 15px; }
    .brand h1 { margin: 0; font-size: 16px; }
    .brand p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
    .nav-title { margin: 16px 8px 8px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .12em; }
    .nav button { width: 100%; text-align: left; border: 0; background: transparent; color: var(--text); padding: 12px 14px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .nav button:hover { background: rgba(148,163,184,.08); }
    .nav button.active { background: rgba(79,70,229,.18); color: #fff; }
    .nav small { color: var(--muted); }
    .sidebar-card { margin-top: 18px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
    .sidebar-card h3 { margin: 0 0 12px; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .metric { display: flex; justify-content: space-between; gap: 12px; margin: 10px 0; }
    .metric span:first-child { color: var(--muted); }
    .metric strong { font-family: var(--mono); }
    .main { display: flex; flex-direction: column; min-width: 0; }
    .topbar { display: flex; align-items: center; gap: 12px; padding: 18px 24px; border-bottom: 1px solid var(--border); background: rgba(15,23,42,.92); position: sticky; top: 0; z-index: 20; backdrop-filter: blur(8px); }
    .topbar h2 { margin: 0; font-size: 20px; }
    .topbar p { margin: 2px 0 0; color: var(--muted); font-size: 13px; }
    .topbar .spacer { flex: 1; }
    .content { padding: 24px; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
    .input, .select, .textarea { width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 12px; padding: 10px 12px; }
    .textarea { min-height: 88px; resize: vertical; }
    .input:focus, .select:focus, .textarea:focus { outline: 2px solid rgba(79,70,229,.35); border-color: transparent; }
    .btn { border: 1px solid var(--border); background: var(--panel); color: var(--text); padding: 10px 14px; border-radius: 12px; cursor: pointer; }
    .btn:hover { background: var(--panel-2); }
    .btn.primary { background: var(--accent); border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-2); }
    .btn.danger { border-color: rgba(239,68,68,.35); color: #fecaca; }
    .btn.ghost { background: transparent; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
    .section { padding: 18px; }
    .section h3 { margin: 0 0 6px; }
    .section p { margin: 0; color: var(--muted); }
    .grid { display: grid; gap: 16px; }
    .grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .stats .card { padding: 18px; }
    .stats .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    .stats .value { margin-top: 10px; font-size: 28px; font-weight: 700; font-family: var(--mono); }
    .stats .sub { margin-top: 8px; color: var(--muted); font-size: 13px; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 14px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: middle; }
    th { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    td .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    tr:hover td { background: rgba(148,163,184,.04); }
    .badge { display: inline-flex; align-items: center; padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .badge.pendiente { background: rgba(245,158,11,.16); color: #fcd34d; }
    .badge.parcial { background: rgba(6,182,212,.15); color: #67e8f9; }
    .badge.pagada { background: rgba(16,185,129,.16); color: #86efac; }
    .badge.anulada { background: rgba(148,163,184,.16); color: #cbd5e1; }
    .empty { padding: 42px 18px; text-align: center; color: var(--muted); }
    .mono { font-family: var(--mono); }
    .split { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .filters { display: grid; grid-template-columns: 220px 220px 1fr; gap: 10px; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(2,6,23,.8); display: none; align-items: center; justify-content: center; padding: 24px; z-index: 100; }
    .modal-backdrop.open { display: flex; }
    .modal { width: min(760px, 100%); background: var(--panel-2); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); }
    .modal header, .modal footer { padding: 18px 22px; border-bottom: 1px solid var(--border); }
    .modal footer { border-top: 1px solid var(--border); border-bottom: 0; display: flex; justify-content: flex-end; gap: 10px; }
    .modal .body { padding: 22px; }
    .form-grid { display: grid; gap: 14px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .form-grid .full { grid-column: 1 / -1; }
    .form-field label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    .toast { position: fixed; right: 20px; bottom: 20px; background: var(--panel-2); border: 1px solid var(--border); color: var(--text); padding: 12px 14px; border-radius: 12px; display: none; z-index: 150; }
    .toast.show { display: block; }
    .auth-warning { margin-bottom: 18px; padding: 14px; border: 1px dashed rgba(245,158,11,.4); background: rgba(245,158,11,.08); border-radius: 14px; color: #fde68a; }
    .hidden { display: none !important; }
    @media (max-width: 1100px) {
      .grid.cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .filters { grid-template-columns: 1fr; }
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .form-grid, .grid.cols-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">IN</div>
        <div>
          <h1>Innovexa ERP</h1>
          <p>Frontend reescrito para Supabase</p>
        </div>
      </div>

      <div class="nav-title">Módulos</div>
      <nav class="nav" id="nav"></nav>

      <div class="sidebar-card">
        <h3>Resumen rápido</h3>
        <div class="metric"><span>Por cobrar</span><strong id="sb-cobrar">$ 0,00</strong></div>
        <div class="metric"><span>Por pagar</span><strong id="sb-pagar">$ 0,00</strong></div>
        <div class="metric"><span>Facturas venta</span><strong id="sb-fv">0</strong></div>
        <div class="metric"><span>Facturas compra</span><strong id="sb-fc">0</strong></div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h2 id="page-title">Dashboard</h2>
          <p id="page-subtitle">Control operativo de ventas, compras, cobros y pagos.</p>
        </div>
        <div class="spacer"></div>
        <button class="btn" onclick="app.openConfigModal()">Configurar Supabase</button>
        <button class="btn primary" id="primary-action" onclick="app.handlePrimaryAction()">Acción</button>
      </div>

      <div class="content">
        <div id="auth-warning" class="auth-warning hidden"></div>
        <div id="view"></div>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <header class="split">
        <div>
          <h3 id="modal-title" style="margin:0"></h3>
          <p id="modal-subtitle" style="margin:6px 0 0;color:var(--muted)"></p>
        </div>
        <button class="btn ghost" onclick="app.closeModal()">Cerrar</button>
      </header>
      <div class="body" id="modal-body"></div>
      <footer id="modal-footer"></footer>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const DEFAULT_CONFIG = {
      supabaseUrl: 'https://TU-PROYECTO.supabase.co',
      supabaseAnonKey: 'REEMPLAZAR_CON_ANON_KEY',
      storageKey: 'innovexa-erp-config-v2'
    };

    const app = {
      config: { ...DEFAULT_CONFIG },
      state: {
        currentView: 'dashboard',
        clientes: [],
        proveedores: [],
        facturasVenta: [],
        facturasCompra: [],
        cobros: [],
        pagos: [],
        filters: {
          clientes: '',
          proveedores: '',
          fventas: '',
          fcompras: '',
          cobros: '',
          pagos: '',
          reportMoneda: 'ARS'
        }
      },
      views: [
        { key: 'dashboard', title: 'Dashboard', action: null },
        { key: 'clientes', title: 'Clientes', action: 'Nuevo cliente' },
        { key: 'fventas', title: 'Facturas de venta', action: 'Nueva factura' },
        { key: 'cobros', title: 'Cobros', action: 'Nuevo cobro' },
        { key: 'proveedores', title: 'Proveedores', action: 'Nuevo proveedor' },
        { key: 'fcompras', title: 'Facturas de compra', action: 'Nueva factura' },
        { key: 'pagos', title: 'Pagos', action: 'Nuevo pago' },
        { key: 'reportes', title: 'Reportes', action: null }
      ],

      init() {
        this.loadConfig();
        this.renderNav();
        this.updateTopbar();
        this.renderView();
        this.refresh().catch(error => this.handleError(error));
      },

      loadConfig() {
        try {
          const raw = localStorage.getItem(DEFAULT_CONFIG.storageKey);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          this.config = { ...this.config, ...parsed };
        } catch (error) {
          console.error(error);
        }
      },

      saveConfig() {
        localStorage.setItem(DEFAULT_CONFIG.storageKey, JSON.stringify({
          supabaseUrl: this.config.supabaseUrl,
          supabaseAnonKey: this.config.supabaseAnonKey
        }));
      },

      get headers() {
        return {
          'Content-Type': 'application/json',
          apikey: this.config.supabaseAnonKey,
          Authorization: `Bearer ${this.config.supabaseAnonKey}`
        };
      },

      get configured() {
        return this.config.supabaseUrl &&
          this.config.supabaseAnonKey &&
          !this.config.supabaseUrl.includes('TU-PROYECTO') &&
          !this.config.supabaseAnonKey.includes('REEMPLAZAR');
      },

      async api(path, options = {}) {
        if (!this.configured) {
          throw new Error('Configurá SUPABASE_URL y SUPABASE_ANON_KEY antes de operar.');
        }
        const response = await fetch(`${this.config.supabaseUrl}${path}`, {
          method: options.method || 'GET',
          headers: { ...this.headers, ...(options.headers || {}) },
          body: options.body ? JSON.stringify(options.body) : undefined
        });
        const text = await response.text();
        const data = text ? JSON.parse(text) : null;
        if (!response.ok) {
          const message = data?.message || data?.hint || data?.details || `Error HTTP ${response.status}`;
          throw new Error(message);
        }
        return data;
      },

      async select(resource, query) {
        return this.api(`/rest/v1/${resource}?${query}`, { method: 'GET' });
      },

      async insert(resource, payload) {
        return this.api(`/rest/v1/${resource}`, {
          method: 'POST',
          headers: { Prefer: 'return=representation' },
          body: payload
        }).then(rows => Array.isArray(rows) ? rows[0] : rows);
      },

      async update(resource, id, payload) {
        return this.api(`/rest/v1/${resource}?id=eq.${id}`, {
          method: 'PATCH',
          headers: { Prefer: 'return=representation' },
          body: payload
        }).then(rows => Array.isArray(rows) ? rows[0] : rows);
      },

      async remove(resource, id) {
        return this.api(`/rest/v1/${resource}?id=eq.${id}`, {
          method: 'DELETE',
          headers: { Prefer: 'return=representation' }
        });
      },

      async rpc(name, payload) {
        return this.api(`/rest/v1/rpc/${name}`, { method: 'POST', body: payload });
      },

      async refresh() {
        if (!this.configured) {
          this.showAuthWarning('Todavía no cargaste la URL y la anon key de Supabase. Abrí “Configurar Supabase”, pegá ambos valores y guardá.');
          this.renderView();
          this.updateSidebar();
          return;
        }
        this.hideAuthWarning();
        const [clientes, proveedores, facturasVenta, facturasCompra, cobros, pagos] = await Promise.all([
          this.select('clientes', 'select=*&order=razon_social.asc'),
          this.select('proveedores', 'select=*&order=razon_social.asc'),
          this.select('v_facturas_venta', 'select=*&order=fecha.desc'),
          this.select('v_facturas_compra', 'select=*&order=fecha.desc'),
          this.select('v_cobros', 'select=*&order=fecha.desc'),
          this.select('v_pagos', 'select=*&order=fecha.desc')
        ]);
        this.state.clientes = clientes || [];
        this.state.proveedores = proveedores || [];
        this.state.facturasVenta = facturasVenta || [];
        this.state.facturasCompra = facturasCompra || [];
        this.state.cobros = cobros || [];
        this.state.pagos = pagos || [];
        this.updateSidebar();
        this.renderView();
      },

      renderNav() {
        const nav = document.getElementById('nav');
        nav.innerHTML = this.views.map(view => `
          <button class="${this.state.currentView === view.key ? 'active' : ''}" onclick="app.setView('${view.key}')">
            <span>${view.title}</span>
            <small>${this.navCount(view.key)}</small>
          </button>
        `).join('');
      },

      navCount(key) {
        const { clientes, proveedores, facturasVenta, facturasCompra, cobros, pagos } = this.state;
        const map = {
          dashboard: '—',
          clientes: clientes.length,
          proveedores: proveedores.length,
          fventas: facturasVenta.length,
          fcompras: facturasCompra.length,
          cobros: cobros.length,
          pagos: pagos.length,
          reportes: '—'
        };
        return map[key];
      },

      setView(key) {
        this.state.currentView = key;
        this.renderNav();
        this.updateTopbar();
        this.renderView();
      },

      updateTopbar() {
        const view = this.views.find(item => item.key === this.state.currentView);
        document.getElementById('page-title').textContent = view?.title || 'Innovexa ERP';
        document.getElementById('page-subtitle').textContent = this.getSubtitle(this.state.currentView);
        const btn = document.getElementById('primary-action');
        if (!view?.action) {
          btn.classList.add('hidden');
        } else {
          btn.classList.remove('hidden');
          btn.textContent = view.action;
        }
      },

      getSubtitle(key) {
        const map = {
          dashboard: 'Visión operativa en tiempo real.',
          clientes: 'Alta, edición y control de cartera.',
          proveedores: 'Gestión de proveedores y deuda comercial.',
          fventas: 'Facturación de ventas con saldo y estado real.',
          fcompras: 'Facturas de compra con saldo y estado real.',
          cobros: 'Cobros vía RPC y saldo recalculado en SQL.',
          pagos: 'Pagos vía RPC y saldo recalculado en SQL.',
          reportes: 'Saldos abiertos, flujos y métricas por moneda.'
        };
        return map[key] || '';
      },

      handlePrimaryAction() {
        const map = {
          clientes: () => this.openClienteModal(),
          proveedores: () => this.openProveedorModal(),
          fventas: () => this.openFacturaVentaModal(),
          fcompras: () => this.openFacturaCompraModal(),
          cobros: () => this.openCobroModal(),
          pagos: () => this.openPagoModal()
        };
        map[this.state.currentView]?.();
      },

      updateSidebar() {
        const cobrar = this.state.facturasVenta.filter(row => row.estado !== 'anulada').reduce((acc, row) => acc + Number(row.saldo || 0), 0);
        const pagar = this.state.facturasCompra.filter(row => row.estado !== 'anulada').reduce((acc, row) => acc + Number(row.saldo || 0), 0);
        document.getElementById('sb-cobrar').textContent = this.formatMoney(cobrar, 'ARS');
        document.getElementById('sb-pagar').textContent = this.formatMoney(pagar, 'ARS');
        document.getElementById('sb-fv').textContent = String(this.state.facturasVenta.length);
        document.getElementById('sb-fc').textContent = String(this.state.facturasCompra.length);
        this.renderNav();
      },

      renderView() {
        const view = document.getElementById('view');
        const key = this.state.currentView;
        const renderers = {
          dashboard: () => this.renderDashboard(),
          clientes: () => this.renderClientes(),
          proveedores: () => this.renderProveedores(),
          fventas: () => this.renderFacturasVenta(),
          fcompras: () => this.renderFacturasCompra(),
          cobros: () => this.renderCobros(),
          pagos: () => this.renderPagos(),
          reportes: () => this.renderReportes()
        };
        view.innerHTML = renderers[key]();
      },

      renderDashboard() {
        const ventasPend = this.state.facturasVenta.filter(row => row.estado !== 'pagada' && row.estado !== 'anulada');
        const comprasPend = this.state.facturasCompra.filter(row => row.estado !== 'pagada' && row.estado !== 'anulada');
        const cobradoMes = this.sumCurrentMonth(this.state.cobros);
        const pagadoMes = this.sumCurrentMonth(this.state.pagos);
        const actividad = [
          ...this.state.cobros.map(row => ({ fecha: row.fecha, tipo: 'Cobro', tercero: row.cliente_nombre, ref: row.factura_numero, importe: row.importe, moneda: row.moneda })),
          ...this.state.pagos.map(row => ({ fecha: row.fecha, tipo: 'Pago', tercero: row.proveedor_nombre, ref: row.factura_numero, importe: row.importe, moneda: row.moneda }))
        ].sort((a, b) => String(b.fecha).localeCompare(String(a.fecha))).slice(0, 12);

        return `
          <div class="grid cols-4 stats">
            <div class="card"><div class="label">Por cobrar</div><div class="value">${this.formatMoney(this.totalSaldo(this.state.facturasVenta), 'ARS')}</div><div class="sub">${ventasPend.length} facturas abiertas</div></div>
            <div class="card"><div class="label">Por pagar</div><div class="value">${this.formatMoney(this.totalSaldo(this.state.facturasCompra), 'ARS')}</div><div class="sub">${comprasPend.length} facturas abiertas</div></div>
            <div class="card"><div class="label">Cobrado este mes</div><div class="value">${this.formatMoney(cobradoMes, 'ARS')}</div><div class="sub">${this.countCurrentMonth(this.state.cobros)} cobros</div></div>
            <div class="card"><div class="label">Pagado este mes</div><div class="value">${this.formatMoney(pagadoMes, 'ARS')}</div><div class="sub">${this.countCurrentMonth(this.state.pagos)} pagos</div></div>
          </div>
          <div class="grid cols-2" style="margin-top:16px">
            <div class="card section">
              <h3>Facturas de venta abiertas</h3>
              <p>Las facturas cerradas ya no ensucian el seguimiento.</p>
              ${this.simpleTable(
                ['Fecha', 'Cliente', 'Número', 'Saldo', 'Estado'],
                ventasPend.slice(0, 8).map(row => [
                  this.formatDate(row.fecha),
                  this.escape(row.cliente_nombre),
                  this.escape(row.numero),
                  this.formatMoney(row.saldo, row.moneda),
                  this.estadoBadge(row.estado)
                ]),
                'No hay facturas de venta abiertas.'
              )}
            </div>
            <div class="card section">
              <h3>Actividad reciente</h3>
              <p>Cobros y pagos ordenados por fecha.</p>
              ${this.simpleTable(
                ['Fecha', 'Tipo', 'Tercero', 'Comprobante', 'Importe'],
                actividad.map(row => [
                  this.formatDate(row.fecha),
                  row.tipo,
                  this.escape(row.tercero || '—'),
                  this.escape(row.ref || '—'),
                  this.formatMoney(row.importe, row.moneda)
                ]),
                'Todavía no hay movimientos.'
              )}
            </div>
          </div>
        `;
      },

      renderClientes() {
        const q = this.state.filters.clientes.toLowerCase();
        const rows = this.state.clientes.filter(row => {
          if (!q) return true;
          return [row.razon_social, row.cuit, row.email].some(value => String(value || '').toLowerCase().includes(q));
        });
        return `
          <div class="toolbar">
            <input class="input" placeholder="Buscar por razón social, CUIT o email" value="${this.escapeAttr(this.state.filters.clientes)}" oninput="app.setFilter('clientes', this.value)">
          </div>
          <div class="card table-wrap">
            ${this.simpleTable(
              ['Razón social', 'CUIT', 'IVA', 'Email', 'Teléfono', 'Acciones'],
              rows.map(row => [
                this.escape(row.razon_social),
                this.escape(row.cuit || '—'),
                this.escape(row.condicion_iva),
                this.escape(row.email || '—'),
                this.escape(row.telefono || '—'),
                `<div class="actions"><button class="btn" onclick="app.openClienteModal(${row.id})">Editar</button><button class="btn danger" onclick="app.deleteCliente(${row.id})">Eliminar</button></div>`
              ]),
              'No hay clientes cargados.'
            )}
          </div>
        `;
      },

      renderProveedores() {
        const q = this.state.filters.proveedores.toLowerCase();
        const rows = this.state.proveedores.filter(row => {
          if (!q) return true;

      renderReportes() {
        const moneda = this.state.filters.reportMoneda;
        const ventasAbiertas = this.state.facturasVenta.filter(row => row.moneda === moneda && row.estado !== 'pagada' && row.estado !== 'anulada');
        const comprasAbiertas = this.state.facturasCompra.filter(row => row.moneda === moneda && row.estado !== 'pagada' && row.estado !== 'anulada');
        const cobrosMes = this.sumCurrentMonth(this.state.cobros.filter(row => row.moneda === moneda));
        const pagosMes = this.sumCurrentMonth(this.state.pagos.filter(row => row.moneda === moneda));

        return `
          <div class="toolbar">
            <select class="select" style="max-width:220px" onchange="app.setFilter('reportMoneda', this.value)">
              <option value="ARS" ${moneda === 'ARS' ? 'selected' : ''}>ARS</option>
              <option value="USD" ${moneda === 'USD' ? 'selected' : ''}>USD</option>
            </select>
          </div>
          <div class="grid cols-4 stats">
            <div class="card"><div class="label">Saldo clientes</div><div class="value">${this.formatMoney(this.totalSaldo(ventasAbiertas), moneda)}</div><div class="sub">${ventasAbiertas.length} facturas abiertas</div></div>
            <div class="card"><div class="label">Saldo proveedores</div><div class="value">${this.formatMoney(this.totalSaldo(comprasAbiertas), moneda)}</div><div class="sub">${comprasAbiertas.length} facturas abiertas</div></div>
            <div class="card"><div class="label">Cobrado mes actual</div><div class="value">${this.formatMoney(cobrosMes, moneda)}</div><div class="sub">Sin mezclar monedas</div></div>
            <div class="card"><div class="label">Pagado mes actual</div><div class="value">${this.formatMoney(pagosMes, moneda)}</div><div class="sub">Sin mezclar monedas</div></div>
          </div>
          <div class="grid cols-2" style="margin-top:16px">
            <div class="card section">
              <h3>Saldos por cliente</h3>
              <p>Solo saldos abiertos en ${moneda}.</p>
              ${this.simpleTable(
                ['Cliente', 'Facturas abiertas', 'Saldo'],
                this.aggregateByName(ventasAbiertas, 'cliente_nombre').map(row => [
                  this.escape(row.nombre),
                  String(row.cantidad),
                  this.formatMoney(row.saldo, moneda)
                ]),
                'No hay saldo abierto para clientes en esa moneda.'
              )}
            </div>
            <div class="card section">
              <h3>Saldos por proveedor</h3>
              <p>Solo saldos abiertos en ${moneda}.</p>
              ${this.simpleTable(
                ['Proveedor', 'Facturas abiertas', 'Saldo'],
                this.aggregateByName(comprasAbiertas, 'proveedor_nombre').map(row => [
                  this.escape(row.nombre),
                  String(row.cantidad),
                  this.formatMoney(row.saldo, moneda)
                ]),
                'No hay saldo abierto para proveedores en esa moneda.'
              )}
            </div>
          </div>
        `;
      },

      simpleTable(headers, rows, emptyMessage) {
        if (!rows.length) {
          return `<div class="empty">${this.escape(emptyMessage)}</div>`;
        }
        return `
          <table>
            <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
            <tbody>
              ${rows.map(cols => `<tr>${cols.map(value => `<td>${value}</td>`).join('')}</tr>`).join('')}
            </tbody>
          </table>
        `;

            <div class="form-grid">
              <div class="form-field full"><label>Factura</label><select id="cobro-factura" class="select" onchange="app.syncCobroInfo()"><option value="">Seleccionar factura abierta</option>${options}</select></div>
              <div class="form-field"><label>Cliente</label><input id="cobro-cliente" class="input" readonly></div>
              <div class="form-field"><label>Saldo disponible</label><input id="cobro-saldo" class="input" readonly></div>
              <div class="form-field"><label>Fecha</label><input id="cobro-fecha" type="date" class="input" value="${this.today()}"></div>
              <div class="form-field"><label>Importe</label><input id="cobro-importe" type="number" step="0.01" min="0.01" class="input"></div>
              <div class="form-field"><label>Medio de pago</label><select id="cobro-medio" class="select">${this.medioPagoOptions('transferencia')}</select></div>
              <div class="form-field"><label>Referencia</label><input id="cobro-referencia" class="input"></div>
              <div class="form-field full"><label>Observaciones</label><textarea id="cobro-observaciones" class="textarea"></textarea></div>
            </div>
          `,
          footer: `
            <button class="btn" onclick="app.closeModal()">Cancelar</button>
            <button class="btn primary" onclick="app.saveCobro()">Registrar</button>
          `
        });
      },

      syncCobroInfo() {
        const select = document.getElementById('cobro-factura');
        const option = select.options[select.selectedIndex];
        document.getElementById('cobro-cliente').value = option?.dataset?.cliente || '';
        const saldo = option?.dataset?.saldo;
        const moneda = option?.dataset?.moneda || 'ARS';
        document.getElementById('cobro-saldo').value = saldo ? this.formatMoney(Number(saldo), moneda) : '';
      },

      async saveCobro() {
        try {
          const facturaId = this.requiredId('cobro-factura', 'Seleccioná una factura para cobrar.');
          const factura = this.state.facturasVenta.find(row => row.id === facturaId);
          if (!factura) throw new Error('La factura seleccionada no existe en memoria.');
          const importe = this.requiredAmount('cobro-importe', 'El importe del cobro debe ser mayor a 0.');
          if (importe > Number(factura.saldo || 0)) {
            throw new Error('El importe excede el saldo disponible.');
          }
          await this.rpc('registrar_cobro', {
            p_factura_id: facturaId,
            p_fecha: this.requiredValue('cobro-fecha', 'La fecha del cobro es obligatoria.'),
            p_importe: importe,
            p_medio_pago: document.getElementById('cobro-medio').value,
            p_referencia: this.optionalValue('cobro-referencia') || null,
            p_observaciones: this.optionalValue('cobro-observaciones') || null
          });
          this.closeModal();
          this.showToast('Cobro registrado.');
          await this.refresh();
        } catch (error) {
          this.handleError(error);
        }
      },

      async deleteCobro(id) {
        if (!confirm('Vas a eliminar el cobro. La factura se va a recalcular en SQL.')) return;
        try {
          await this.rpc('eliminar_cobro', { p_cobro_id: id });
          this.showToast('Cobro eliminado.');
          await this.refresh();
        } catch (error) {
          this.handleError(error);
        }
      },

      openPagoModal() {
        const options = this.state.facturasCompra
          .filter(row => Number(row.saldo || 0) > 0 && row.estado !== 'anulada')
          .map(row => `<option value="${row.id}" data-proveedor="${this.escapeAttr(row.proveedor_nombre)}" data-saldo="${row.saldo}" data-moneda="${row.moneda}">${this.escape(row.numero)} · ${this.escape(row.proveedor_nombre)} · ${this.formatMoney(row.saldo, row.moneda)}</option>`)
          .join('');
        this.openModal({
          title: 'Registrar pago',
          subtitle: 'La validación final corre en la RPC registrar_pago.',
          body: `
            <div class="form-grid">
              <div class="form-field full"><label>Factura</label><select id="pago-factura" class="select" onchange="app.syncPagoInfo()"><option value="">Seleccionar factura abierta</option>${options}</select></div>
              <div class="form-field"><label>Proveedor</label><input id="pago-proveedor" class="input" readonly></div>
              <div class="form-field"><label>Saldo disponible</label><input id="pago-saldo" class="input" readonly></div>
              <div class="form-field"><label>Fecha</label><input id="pago-fecha" type="date" class="input" value="${this.today()}"></div>
              <div class="form-field"><label>Importe</label><input id="pago-importe" type="number" step="0.01" min="0.01" class="input"></div>
              <div class="form-field"><label>Medio de pago</label><select id="pago-medio" class="select">${this.medioPagoOptions('transferencia')}</select></div>
              <div class="form-field"><label>Referencia</label><input id="pago-referencia" class="input"></div>
              <div class="form-field full"><label>Observaciones</label><textarea id="pago-observaciones" class="textarea"></textarea></div>
            </div>
          `,
          footer: `
            <button class="btn" onclick="app.closeModal()">Cancelar</button>
            <button class="btn primary" onclick="app.savePago()">Registrar</button>
          `
        });
      },

      syncPagoInfo() {
        const select = document.getElementById('pago-factura');
        const option = select.options[select.selectedIndex];
        document.getElementById('pago-proveedor').value = option?.dataset?.proveedor || '';
        const saldo = option?.dataset?.saldo;
        const moneda = option?.dataset?.moneda || 'ARS';
        document.getElementById('pago-saldo').value = saldo ? this.formatMoney(Number(saldo), moneda) : '';
      },

      async savePago() {
        try {
          const facturaId = this.requiredId('pago-factura', 'Seleccioná una factura para pagar.');
          const factura = this.state.facturasCompra.find(row => row.id === facturaId);
          if (!factura) throw new Error('La factura seleccionada no existe en memoria.');
          const importe = this.requiredAmount('pago-importe', 'El importe del pago debe ser mayor a 0.');
          if (importe > Number(factura.saldo || 0)) {
            throw new Error('El importe excede el saldo disponible.');
          }
          await this.rpc('registrar_pago', {
            p_factura_id: facturaId,
            p_fecha: this.requiredValue('pago-fecha', 'La fecha del pago es obligatoria.'),
            p_importe: importe,
            p_medio_pago: document.getElementById('pago-medio').value,
            p_referencia: this.optionalValue('pago-referencia') || null,
            p_observaciones: this.optionalValue('pago-observaciones') || null
          });
          this.closeModal();
          this.showToast('Pago registrado.');
          await this.refresh();
        } catch (error) {
          this.handleError(error);
        }
      },

      async deletePago(id) {
        if (!confirm('Vas a eliminar el pago. La factura se va a recalcular en SQL.')) return;
        try {
          await this.rpc('eliminar_pago', { p_pago_id: id });
          this.showToast('Pago eliminado.');
          await this.refresh();
        } catch (error) {
          this.handleError(error);
        }
      },

      openModal({ title, subtitle = '', body, footer = '' }) {
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-subtitle').textContent = subtitle;
        document.getElementById('modal-body').innerHTML = body;
        document.getElementById('modal-footer').innerHTML = footer;
        document.getElementById('modal-backdrop').classList.add('open');
      },

      closeModal() {
        document.getElementById('modal-backdrop').classList.remove('open');
      },

      setFilter(key, value) {
        this.state.filters[key] = value;
        this.renderView();
      },

      requiredValue(id, message) {
        const value = document.getElementById(id).value.trim();
        if (!value) throw new Error(message);
        return value;
      },

      optionalValue(id) {
        return document.getElementById(id).value.trim();
      },

      requiredId(id, message) {
        const raw = document.getElementById(id).value;
        const value = Number(raw);
        if (!Number.isInteger(value) || value <= 0) throw new Error(message);
        return value;
      },

      requiredAmount(id, message) {
        const value = Number(document.getElementById(id).value);
        if (!Number.isFinite(value) || value <= 0) throw new Error(message);
        return Number(value.toFixed(2));
      },

      validatedEmail(id) {
        const value = this.optionalValue(id);
        if (!value) return null;
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(value)) throw new Error('El email no tiene un formato válido.');
        return value;
      },

      ivaOptions(selected) {
        return [
          ['RI', 'Responsable inscripto'],
          ['MO', 'Monotributista'],
          ['EX', 'Exento'],
          ['CF', 'Consumidor final']
        ].map(([value, label]) => `<option value="${value}" ${value === selected ? 'selected' : ''}>${label}</option>`).join('');
      },

      monedaOptions(selected) {
        return ['ARS', 'USD'].map(value => `<option value="${value}" ${value === selected ? 'selected' : ''}>${value}</option>`).join('');
      },

      medioPagoOptions(selected) {
        return [
          ['transferencia', 'Transferencia'],
          ['cheque', 'Cheque'],
          ['efectivo', 'Efectivo'],
          ['tarjeta', 'Tarjeta'],
          ['otro', 'Otro']
        ].map(([value, label]) => `<option value="${value}" ${value === selected ? 'selected' : ''}>${label}</option>`).join('');
      },

      medioPagoLabel(value) {
        return ({
          transferencia: 'Transferencia',
          cheque: 'Cheque',
          efectivo: 'Efectivo',
          tarjeta: 'Tarjeta',
          otro: 'Otro'
        })[value] || value || '—';
      },

      totalSaldo(rows) {
        return rows.reduce((acc, row) => acc + Number(row.saldo || 0), 0);
      },

      aggregateByName(rows, field) {
        const map = new Map();
        rows.forEach(row => {
          const key = row[field] || '—';
          const current = map.get(key) || { nombre: key, cantidad: 0, saldo: 0 };
          current.cantidad += 1;
          current.saldo += Number(row.saldo || 0);
          map.set(key, current);
        });
        return Array.from(map.values()).sort((a, b) => b.saldo - a.saldo);
      },

      countCurrentMonth(rows) {
        const prefix = this.today().slice(0, 7);
        return rows.filter(row => String(row.fecha || '').startsWith(prefix)).length;
      },

      sumCurrentMonth(rows) {
        const prefix = this.today().slice(0, 7);
        return rows.filter(row => String(row.fecha || '').startsWith(prefix)).reduce((acc, row) => acc + Number(row.importe || 0), 0);
      },

      today() {
        return new Date().toISOString().slice(0, 10);
      },

      formatDate(value) {
        if (!value) return '—';
        const [y, m, d] = String(value).slice(0, 10).split('-');
        return `${d}/${m}/${y}`;
      },

      formatMoney(value, moneda = 'ARS') {
        const prefix = moneda === 'USD' ? 'U$S ' : '$ ';
        return prefix + Number(value || 0).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      },

      escape(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      },

      escapeAttr(value) {
        return this.escape(value).replaceAll('`', '&#96;');
      },

      estadoBadge(value) {
        const label = ({ pendiente: 'Pendiente', parcial: 'Parcial', pagada: 'Pagada', anulada: 'Anulada' })[value] || value || '—';
        return `<span class="badge ${this.escapeAttr(value || 'anulada')}">${this.escape(label)}</span>`;
      },

      showToast(message) {
        const node = document.getElementById('toast');
        node.textContent = message;
        node.classList.add('show');
        clearTimeout(this.toastTimer);
        this.toastTimer = setTimeout(() => node.classList.remove('show'), 2600);
      },

      showAuthWarning(message) {
        const node = document.getElementById('auth-warning');
        node.textContent = message;
        node.classList.remove('hidden');
      },

      hideAuthWarning() {
        document.getElementById('auth-warning').classList.add('hidden');
      },

      handleError(error) {
        console.error(error);
        const message = error instanceof Error ? error.message : String(error);
        alert(message);
      }
    };

    document.getElementById('modal-backdrop').addEventListener('click', event => {
      if (event.target.id === 'modal-backdrop') {
        app.closeModal();
      }
    });

    app.init();
  </script>
</body>
</html>
